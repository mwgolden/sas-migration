# https://qdrant.tech/documentation/quickstart/

version: "3.9"

services:
  qdrant: 
    image: qdrant/qdrant:latest
    restart: unless-stopped

    ports: 
      - "6333:6333" #REST API
      - "6334:6334" #gRPC API

    volumes:
      - qdrant_data:/qdrant/storage

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  qdrant_data: